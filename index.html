<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diablo II - Catalogue de Mots Runiques</title>
  <link rel="icon" type="image/x-icon" href="src/assets/icons/favicon.png">
  <link rel="stylesheet" href="src/css/base.css" />
</head>

<body>
  <h1>Mots Runiques</h1>

  <main>
    <section class="overtop" id="filters-section">
      <div class="filters first">
        <h2>Filtres</h2>
      </div>
      <section class="second" id="filters-panel">
        <section class="third categories" id="categories-panel">
          <h3>Supports</h3>
        </section>
        <section class="third runes" id="runes-panel">
          <h3>Runes</h3>
          <section class="fourth rune-headers" id="rune-headers">
            <div id="common-runes">
              <p>Communes</p>
            </div>
            <div id="rare-runes">
              <p>Rares</p>
            </div>
            <div id="very-rare-runes">
              <p>Très rares</p>
            </div>
          </section>
        </section>
        <section class="third sockets" id="sockets-panel">
          <h3>Châsses</h3>
        </section>
      </section>
    </section>

    <section class="overtop" id="runewords-section">
      <div class="runewords first">
        <h2>Mots Runiques</h2>
      </div>
      <section class="second" id="runewords-panel"></section>
    </section>

    <section class="overtop" id="details-section">
      <div class="details first">
        <h2>Détails</h2>
      </div>
      <section class="second" id="details-panel"></section>
    </section>
  </main>

  <script src="src/scripts/main.js"></script>

  <footer>
    <p>© 2026 Diablo II Runewords Catalog. Tous droits réservés.</p>
  </footer>
</body>

</html>
